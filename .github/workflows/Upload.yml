name: Upload Release to SourceForge

on:
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'Device codename'
        required: true
        default: 'gta4l'
      RELEASE_TAG:
        description: 'Release tag (اتركه فاضي لآخر release)'
        required: false
        default: ''

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Upload to SourceForge
        env:
          SF_KEY_B64: ${{ secrets.SF_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SF_KEY_B64" | base64 -d > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null

          # جيب الـ release
          if [ -z "${{ github.event.inputs.RELEASE_TAG }}" ]; then
            API_URL="https://api.github.com/repos/${{ github.repository }}/releases/latest"
          else
            API_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.RELEASE_TAG }}"
          fi

          # جيب كل الـ ZIPs من الـ release
          ASSETS=$(curl -s -H "Authorization: token $GH_TOKEN" "$API_URL" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          zips = [a['browser_download_url'] for a in assets
                  if a['name'].endswith('.zip')
                  and 'ota' not in a['name'].lower()
                  and 'incremental' not in a['name'].lower()]
          print('\n'.join(zips))
          ")

          if [ -z "$ASSETS" ]; then
            echo "No ZIP found in release!"
            exit 0
          fi

          echo "$ASSETS" | while read -r ZIP_URL; do
            FILENAME=$(basename "$ZIP_URL")
            echo "📦 Found: $FILENAME"

            # كشف اسم الـ ROM بذكاء
            ROM_RAW=$(echo "$FILENAME" | sed 's/[-_].*//' | tr '[:upper:]' '[:lower:]')
            ROM_NAME=$(echo "$ROM_RAW" | sed 's/android$//' | sed 's/aosp$//')

            case "$ROM_NAME" in
              axion)      SF_FOLDER="AxionOS" ;;
              matrixx)    SF_FOLDER="Matrixx" ;;
              lineage)    SF_FOLDER="LineageOS" ;;
              crdroid*)   SF_FOLDER="crDroid" ;;
              infinity*)  SF_FOLDER="InfinityX" ;;
              lunaris*)   SF_FOLDER="Lunaris" ;;
              rising*)    SF_FOLDER="RisingOS" ;;
              pixel*)     SF_FOLDER="PixelOS" ;;
              arrow*)     SF_FOLDER="ArrowOS" ;;
              derp*)      SF_FOLDER="DerpFest" ;;
              evox*)      SF_FOLDER="EvolutionX" ;;
              *)          SF_FOLDER="$ROM_RAW" ;;
            esac

            SF_PATH="/home/frs/project/gta4l-builds/$SF_FOLDER/${{ github.event.inputs.DEVICE_NAME }}"
            echo "⬆️ Uploading: $FILENAME → $SF_PATH"

            curl -L -H "Authorization: token $GH_TOKEN" -o "/tmp/$FILENAME" "$ZIP_URL"

            rsync -avP \
              -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
              "/tmp/$FILENAME" \
              "mkpromvp@frs.sourceforge.net:$SF_PATH/"

            echo "✅ Done: https://sourceforge.net/projects/gta4l-builds/files/$SF_FOLDER/${{ github.event.inputs.DEVICE_NAME }}/"
            rm -f "/tmp/$FILENAME"
          done
